<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator.css">
    <link rel="stylesheet" href="css/all.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="historyRow">
            <span><i class="fa fa-bars" aria-hidden="true"></i></span>
            <span>Standard</span>
        </div>
        <div id="output">1234567012345670</div>
        <div class="calculatorControls">
            <span>MC</span>
            <span>MR</span>
            <span>M+</span>
            <span>M-</span>
            <span>MS</span>
            <span>M <i class="fa fa-angle-down" aria-hidden="true"></i></span>
        </div>
        <div class="buttons">
            <button class="btn">%</button>
            <button class="btn">CE</button>
            <button class="btn">C</button>
            <button class="btn"><i class="fas fa-backspace    "></i></button>
        </div>
         <div class="buttons">
            <button class="btn">1/x</button>
            <button class="btn">x**2</button>
            <button class="btn">2<i class="fas fa-square-root-alt    "></i></button>
            <button class="btn"><i class="fas fa-divide    "></i></button>
        </div>
         <div class="buttons">
            <button class="btn bg-secondary">7</button>
            <button class="btn bg-secondary">8</button>
            <button class="btn bg-secondary">9</button>
            <button class="btn">x</button>
        </div>
        <div class="buttons">
            <button class="btn bg-secondary">4</button>
            <button class="btn bg-secondary">5</button>
            <button class="btn bg-secondary">6</button>
            <button class="btn"><i class="fa fa-minus" aria-hidden="true"></i></button>
        </div>
        <div class="buttons">
            <button class="btn bg-secondary">1</button>
            <button class="btn bg-secondary">2</button>
            <button class="btn bg-secondary">3</button>
            <button class="btn"><i class="fa fa-plus" aria-hidden="true"></i></button>
        </div>
        <div class="buttons">
            <button class="btn bg-secondary">+/-</button>
            <button class="btn bg-secondary">0</button>
            <button class="btn bg-secondary dot">.</button>
            <button class="btn equalTo"><i class="fas fa-equals    "></i></button>
        </div>
    </div>
</body>
</html>
